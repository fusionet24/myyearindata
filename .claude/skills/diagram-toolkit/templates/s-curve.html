<style>
.dtk-scurve { --green:#0aaa50; --green-lt:#0dcc60; --green-bg:rgba(10,170,80,0.07); --card:#f5f7f6; --txt:#111827; --txt2:#374151; --txt3:#6b7280; --bdr:rgba(17,24,39,0.08); --bdr2:rgba(17,24,39,0.15); --red:#ef4444; --grey:#6b7280; font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; padding:32px; border:1px solid var(--bdr); border-radius:12px; margin:24px 0; background:#fff; }
.dtk-scurve h3 { font-size:17px; font-weight:700; color:var(--txt); margin:0 0 6px; }
.dtk-scurve .scurve-sub { font-size:12px; color:var(--txt3); margin:0 0 28px; }
.dtk-scurve .scurve-container { width:100%; }
.dtk-scurve .scurve-svg { width:100%; height:auto; }
.dtk-scurve .scurve-svg text { font-family:'Inter',sans-serif; }
.dtk-scurve .scurve-svg .axis-label { fill:var(--txt3); font-size:10px; font-weight:500; }
.dtk-scurve .scurve-svg .stage-label { fill:var(--txt2); font-size:9px; font-weight:600; }
.dtk-scurve .scurve-svg .annotation-text { font-size:9px; font-weight:600; fill:var(--green); }
.dtk-scurve .scurve-svg .annotation-text-muted { font-size:9px; font-weight:600; fill:var(--txt2); }
.dtk-scurve .scurve-legend { display:flex; gap:24px; justify-content:center; margin-top:12px; }
.dtk-scurve .scurve-legend-item { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--txt2); font-weight:500; }
.dtk-scurve .scurve-legend-line { width:24px; height:3px; border-radius:2px; }
.dtk-scurve .scurve-legend-line.solid { background:var(--green); }
.dtk-scurve .scurve-legend-line.dashed { background:repeating-linear-gradient(to right, var(--grey) 0 6px, transparent 6px 10px); }
</style>

<div class="dtk-scurve">
  <h3>The Value-Complexity Inflection</h3>
  <p class="scurve-sub">Value follows an S-curve &mdash; operational maturity determines whether you're in the green or red zone</p>

  <div class="scurve-container">
    <!-- CUSTOMIZE: SVG paths, annotations, and stage labels -->
    <svg class="scurve-svg" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="dtk-greenFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0aaa50" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="#0aaa50" stop-opacity="0.02"/>
        </linearGradient>
        <linearGradient id="dtk-redFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ef4444" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#ef4444" stop-opacity="0.02"/>
        </linearGradient>
      </defs>

      <!-- Grid lines -->
      <g opacity="0.08">
        <line x1="80" y1="50" x2="80" y2="340" stroke="#111827"/>
        <line x1="80" y1="340" x2="760" y2="340" stroke="#111827"/>

        <line x1="80" y1="200" x2="760" y2="200" stroke="#111827" stroke-dasharray="4"/>
        <line x1="80" y1="130" x2="760" y2="130" stroke="#111827" stroke-dasharray="4"/>
      </g>

      <!-- CUSTOMIZE: green zone fill path -->
      <path d="M80,320 C180,318 220,310 310,285 C380,265 420,220 470,150 C520,90 580,60 650,50 C690,44 730,40 760,38 L760,340 L560,340 C520,340 480,330 440,310 C400,290 350,280 310,290 C280,296 220,315 180,325 C140,332 100,335 80,336 Z" fill="url(#dtk-greenFill)"/>

      <!-- CUSTOMIZE: red zone fill path -->
      <path d="M500,180 C520,150 540,130 560,120 L560,340 L500,340 C490,330 485,310 490,290 C495,260 498,220 500,180 Z" fill="url(#dtk-redFill)" opacity="0.5"/>

      <!-- CUSTOMIZE: complexity curve (dashed grey) -->
      <path d="M80,330 C150,328 220,322 310,300 C380,282 430,250 490,200 C540,155 590,120 650,95 C710,72 740,60 760,52"
        fill="none" stroke="#6b7280" stroke-width="2.5" stroke-dasharray="8,5" stroke-linecap="round"/>

      <!-- CUSTOMIZE: value curve (solid green) -->
      <path d="M80,335 C150,332 230,325 310,310 C370,298 410,270 460,210 C510,150 560,95 640,65 C700,45 740,38 760,35"
        fill="none" stroke="#0aaa50" stroke-width="3" stroke-linecap="round"/>

      <!-- CUSTOMIZE: annotations -->
      <line x1="390" y1="60" x2="390" y2="310" stroke="#0aaa50" stroke-width="1" stroke-dasharray="4" opacity="0.3"/>
      <text x="395" y="75" class="annotation-text" font-size="10">The New</text>
      <text x="395" y="87" class="annotation-text" font-size="10">Inflection Point</text>

      <text x="510" y="200" class="annotation-text-muted" font-size="9">Ops maturity</text>
      <text x="510" y="212" class="annotation-text-muted" font-size="9">determines zone</text>

      <!-- Y-axis label -->
      <text x="30" y="200" class="axis-label" text-anchor="middle" transform="rotate(-90, 30, 200)" font-size="11">Value Delivered</text>

      <!-- CUSTOMIZE: stage labels along X-axis -->
      <text x="110" y="365" class="stage-label" text-anchor="middle">Descriptive</text>
      <text x="195" y="365" class="stage-label" text-anchor="middle">Diagnostic</text>
      <text x="290" y="365" class="stage-label" text-anchor="middle">Predictive</text>
      <text x="390" y="365" class="stage-label" text-anchor="middle">Prescriptive</text>
      <text x="500" y="365" class="stage-label" text-anchor="middle">GenAI</text>
      <text x="600" y="365" class="stage-label" text-anchor="middle">Agentic</text>
      <text x="710" y="365" class="stage-label" text-anchor="middle">Autonomous</text>
    </svg>
  </div>

  <!-- CUSTOMIZE: legend items -->
  <div class="scurve-legend">
    <div class="scurve-legend-item">
      <div class="scurve-legend-line solid"></div>
      <span>Value</span>
    </div>
    <div class="scurve-legend-item">
      <div class="scurve-legend-line dashed"></div>
      <span>Complexity</span>
    </div>
  </div>
</div>
